<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nudge Randomizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Roboto:wght@300;400;500;600;700&family=PT+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #F5F0EB;
    --surface: #FFFFFF;
    --surface-2: #FAF8F5;
    --border: #E5DDD4;
    --border-light: #EDE8E2;
    --text: #111827;
    --text-muted: #6B7280;
    --text-dim: #9CA3AF;
    --primary: #111111;
    --accent: #8B5CF6;
    --accent-service: #EA580C;
    --green: #16A34A;
    --yellow: #D97706;
    --red: #DC2626;
    --blue: #2563EB;
    --cyan: #0891B2;
    --paper-shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
    --paper-shadow-lg: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .header {
    text-align: center;
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--primary);
    margin-bottom: 6px;
  }
  .header p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    font-weight: 400;
  }

  .randomize-btn {
    width: 100%;
    padding: 16px 24px;
    background: var(--primary);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    letter-spacing: 0.3px;
    box-shadow: var(--paper-shadow-lg);
  }
  .randomize-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .randomize-btn:active { transform: translateY(0); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    box-shadow: var(--paper-shadow);
  }
  .card-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* User profile card */
  .profile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px 16px;
  }
  .profile-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .profile-label {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .profile-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .profile-value.highlight { color: var(--accent); }

  /* Prompt card */
  .prompt-text {
    background: var(--surface-2);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-style: italic;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 10px;
    word-break: break-word;
  }
  .prompt-meta {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .prompt-meta strong {
    font-weight: 600;
    color: var(--text);
  }

  /* Actions card */
  .actions-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .action-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text);
    padding: 5px 0;
  }
  .action-check {
    color: var(--green);
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* Feature scores card */
  .score-table {
    width: 100%;
    border-collapse: collapse;
  }
  .score-table th {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    padding: 8px 8px;
    text-align: left;
    border-bottom: 2px solid var(--border);
  }
  .score-table th:last-child { text-align: right; }
  .score-table td {
    padding: 10px 8px;
    font-size: 13px;
    border-bottom: 1px solid var(--border-light);
  }
  .score-table tr:last-child td { border-bottom: none; }
  .score-table .fname {
    font-weight: 600;
    white-space: nowrap;
  }
  .score-table .num {
    font-family: 'PT Mono', monospace;
    font-size: 12px;
    text-align: center;
    min-width: 36px;
    color: var(--text-muted);
  }
  .score-table .total {
    font-family: 'PT Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    min-width: 40px;
  }
  .score-table .total.below { color: var(--text-dim); }
  .score-table .total.above { color: var(--green); }
  .score-table .total.top { color: var(--accent); }
  .score-table .badge-cell { text-align: right; min-width: 70px; }
  .badge {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 4px;
    display: inline-block;
  }
  .badge.next { background: #F5F3FF; color: var(--accent); border: 1px solid #DDD6FE; }
  .badge.queued { background: #FFFBEB; color: var(--yellow); border: 1px solid #FDE68A; }
  .badge.filtered { background: #FEF2F2; color: var(--red); border: 1px solid #FECACA; }
  .filtered-row { opacity: 0.35; }

  /* Nudge card */
  .nudge-card-wrap {
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    box-shadow: var(--paper-shadow-lg);
    animation: nudgeIn 0.4s ease;
  }
  .nudge-card-wrap.service { border-color: #FDBA74; }
  @keyframes nudgeIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .nudge-header {
    padding: 24px 24px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nudge-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: #F5F3FF;
    border: 1px solid #EDE9FE;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .nudge-card-wrap.service .nudge-icon {
    background: #FFF7ED;
    border-color: #FDBA74;
  }
  .nudge-tag {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    opacity: 0.7;
  }
  .nudge-card-wrap.service .nudge-tag { color: var(--accent-service); }
  .nudge-body {
    padding: 16px 24px 24px;
  }
  .nudge-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
    color: var(--primary);
  }
  .nudge-desc {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-muted);
    margin-bottom: 24px;
  }
  .nudge-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .nudge-cta {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    background: var(--primary);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: default;
    letter-spacing: 0.2px;
  }
  .nudge-cta.service { background: var(--accent-service); }
  .nudge-dismiss {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    cursor: default;
  }
  .nudge-footer {
    padding: 0 24px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nudge-pro-badge {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    background: #F5F3FF;
    border: 1px solid #DDD6FE;
    color: var(--accent);
  }
  .nudge-pro-badge.service {
    background: #FFF7ED;
    border-color: #FDBA74;
    color: var(--accent-service);
  }
  .nudge-feature-label {
    font-size: 11px;
    color: var(--text-dim);
  }
  .nudge-meta {
    margin-top: 16px;
    padding: 14px 16px;
    background: var(--surface-2);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .nudge-meta strong { color: var(--text); font-weight: 600; }

  /* No nudge state */
  .no-nudge {
    text-align: center;
    padding: 40px 24px;
    color: var(--text-dim);
    font-size: 14px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    background: var(--surface-2);
  }
  .no-nudge-icon { font-size: 32px; margin-bottom: 12px; }

  /* Initial empty state */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
    font-size: 15px;
  }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Nudge Randomizer</h1>
      <p>Generate a random scenario and see which nudge fires.</p>
    </div>
    <button class="randomize-btn" onclick="randomizeAll()">Randomize</button>
    <div id="results">
      <div class="empty-state">
        <div class="empty-state-icon">&#x1F3B2;</div>
        Click Randomize to generate a scenario
      </div>
    </div>
  </div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// 1. CONFIG
// ══════════════════════════════════════════════════════════════════════════════

var CONFIG = {

function profileUser() {
  var u = state.user;

  // Legacy audience strings → new names.
  if (u.audience && AUDIENCE_ALIASES[u.audience]) u.audience = AUDIENCE_ALIASES[u.audience];
  var audienceStakes = getAudienceStakes(u.audience);
  var effectiveStakes = (audienceStakes === 'unknown') ? 'internal' : audienceStakes;
  var baseKey = u.role + '|' + effectiveStakes;
  var baseVec = MINDSET_VECTORS[baseKey] || MINDSET_FALLBACK;
  var overrideKey = u.role + '|' + (u.audience || '');
  var mindsetVector = applyMindsetOverride(baseVec, overrideKey);
  u.mindsetVector = mindsetVector;
  u.audienceStakes = audienceStakes;
  u.mindsetKey = baseKey;
  u.mindsetOverrideApplied = !!MINDSET_OVERRIDES[overrideKey];

  DIRECT_MAP['mindset-vector'] = mindsetVector;
  state.activeSignals.add('mindset-vector');

  // Emit stakes tag (classification only — no direct weight).
  state.activeSignals.add('stakes-' + audienceStakes);

  var synthesis = PROMPT_SYNTHESIS[u.topic];
  if (!synthesis) {
    synthesis = synthesizeFromKeywords(u.topic);
  }
  u.promptSynthesis = synthesis;
  DIRECT_MAP['prompt-synthesis'] = synthesis;
  state.activeSignals.add('prompt-synthesis');
}

function synthesizeFromKeywords(prompt) {
  var p = (prompt || '').toLowerCase()
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .replace(/([a-z])(\d)/g, '$1 $2')
    .replace(/(\d)([a-z])/g, '$1 $2')
    .replace(/[_\-]/g, ' ')
    .replace(/\s+/g, ' ').trim();

  var scores = {};
  FEATURES.forEach(function(f) { scores[f.id] = 0; });

  var keywords = {
    'ai-models':     ['quality', 'better', 'improve', 'upgrade', 'ai', 'smart', 'polished', 'professional', 'good', 'premium'],
    'brand-kit':     ['brand', 'logo', 'colors', 'identity', 'company', 'style', 'design system', 'corporate', 'theme'],
    'unbranded':     ['professional', 'clean', 'client', 'enterprise', 'investor', 'watermark', 'template', 'pitch', 'proposal', 'formal'],
    'export':        ['download', 'pdf', 'powerpoint', 'pptx', 'email', 'offline', 'print', 'send', 'share', 'present'],
    'invite-collab': ['team', 'collaborate', 'together', 'review', 'feedback', 'we ', 'our ', 'group', 'cowork'],
    'analytics':     ['track', 'analytics', 'metrics', 'engagement', 'data', 'measure', 'roi', 'investor', 'sales', 'funnel'],
    'hire-team':     ['help me', 'help', 'struggle', "can't", 'cant', 'complicated', 'too hard', 'do it for', 'build it for', 'need a', 'make me', 'create a']
  };

  var urgencyPatterns = ['tomorrow', 'tonight', 'urgent', 'asap', 'deadline', 'due', 'rush',
    'needed by', 'end of day', 'eod', 'within', 'days', 'hours', 'hours left', 'by friday',
    'by monday', 'by tuesday', 'by wednesday', 'by thursday', 'this week', 'right now', 'immediately'];
  var hasUrgency = urgencyPatterns.some(function(w) { return p.indexOf(w) !== -1; });

  var isPitch = ['pitch', 'pitch deck', 'pitchdeck', 'deck', 'presentation', 'ppt', 'slides'].some(function(w) { return p.indexOf(w) !== -1; });

  Object.keys(keywords).forEach(function(featureId) {
    var matches = 0;
    keywords[featureId].forEach(function(kw) {
      if (p.indexOf(kw) !== -1) matches++;
    });
    scores[featureId] = Math.min(matches * 2, 5);
  });

  if (isPitch) {
    scores['unbranded'] = Math.max(scores['unbranded'], 2);
    scores['export'] = Math.max(scores['export'], 2);
    scores['ai-models'] = Math.max(scores['ai-models'], 2);
  }

  if (hasUrgency) {
    scores['export'] = Math.min(scores['export'] + 3, 5);
    scores['hire-team'] = Math.min(scores['hire-team'] + 3, 5);
    scores['ai-models'] = Math.min(scores['ai-models'] + 2, 5);
  }

  return scores;
}

// Classify audience → stakes bucket. Returns 'critical' | 'external' | 'internal' | 'unknown'.
// Mirrors config/context-layers.json. Blank / unmatched strings return 'unknown'.
function getAudienceStakes(audience) {
  if (!audience || typeof audience !== 'string') return 'unknown';
  var a = AUDIENCE_ALIASES[audience] || audience;
  var CRITICAL = ['→ Investors', '→ VCs', '→ Board members', '→ Angel investors',
                  '→ Enterprise clients', '→ C-suite buyers'];
  var EXTERNAL = ['→ Prospects', '→ Potential clients', '→ Recruiters', '→ Art directors'];
  var INTERNAL = ['→ Exec team', '→ Executives', '→ Stakeholders', '→ XFN stakeholders',
                  '→ Students', '→ Corporate trainees', '→ Workshop attendees',
                  '→ Professor', '→ Panel judges', '→ Classmates'];
  if (CRITICAL.indexOf(a) !== -1) return 'critical';
  if (EXTERNAL.indexOf(a) !== -1) return 'external';
  if (INTERNAL.indexOf(a) !== -1) return 'internal';
  return 'unknown';
}

// Sparse role × audience overrides on top of the base role × stakes vector.
var MINDSET_OVERRIDES = {
  'Leadership|→ Investors':          { 'unbranded': 2, 'analytics': 2 },
  'Leadership|→ Board members':      { 'analytics': 2, 'export': 2 },
  'Sales|→ Investors':               { 'unbranded': 3, 'analytics': 2, 'brand-kit': 1 },
  'Sales|→ Enterprise clients':      { 'unbranded': 2, 'analytics': 1 },
  'Marketing|→ C-suite buyers':      { 'analytics': 2, 'brand-kit': 2 },
  'Design|→ Art directors':          { 'brand-kit': 1, 'unbranded': 1 },
  'Creator|→ Recruiters':            { 'brand-kit': 2, 'unbranded': 2 },
  'Engineering|→ Investors':         { 'hire-team': 2, 'unbranded': 1 },
  'Engineering|→ Exec team':         { 'invite-collab': 1, 'export': 1 },
  'Data Analytics|→ Board members':  { 'analytics': 3, 'export': 2 },
  'Finance|→ Board members':         { 'analytics': 2, 'export': 3 },
  'Finance|→ Investors':             { 'analytics': 2, 'export': 2, 'unbranded': 1 },
  'Consulting|→ C-suite buyers':     { 'hire-team': 2, 'brand-kit': 1 },
  'Consulting|→ Enterprise clients': { 'unbranded': 2, 'brand-kit': 1 },
  'Teacher|→ Students':              { 'invite-collab': -2, 'export': 1 },
  'Student|→ Professor':             { 'export': 3, 'unbranded': 1 },
  'Student|→ Panel judges':          { 'export': 2, 'unbranded': 2, 'hire-team': 1 }
};

function applyMindsetOverride(baseVector, overrideKey) {
  var override = MINDSET_OVERRIDES[overrideKey];
  if (!override) return baseVector;
  var out = Object.assign({}, baseVector);
  Object.keys(override).forEach(function(f) {
    out[f] = (out[f] || 0) + override[f];
  });
  return out;
}

function addStateSignals() {
  var u = state.user;

  if (u.credits < 30) state.activeSignals.add('credits-low');
  if (u.credits === 0) state.activeSignals.add('credits-zero');
  if (u.sessionNum > 1) state.activeSignals.add('returning-user');
  if (u.boughtExport) state.activeSignals.add('bought-export');
  if (u.dismissals === 0) state.activeSignals.add('zero-dismissals');
  if (u.isCompanyDomain) state.activeSignals.add('company-domain');
  if (u.countryTier === 1) state.activeSignals.add('tier-1-country');

  if (u.decksCompleted >= 5) state.activeSignals.add('deck-veteran');
  if (u.decksShared >= 2) state.activeSignals.add('deck-sharer');
  if (u.decksPublished >= 1) state.activeSignals.add('deck-publisher');

  if (u.acqChannel === 'organic') state.activeSignals.add('acq-organic');
  if (u.acqChannel === 'paid') state.activeSignals.add('acq-paid');
  if (u.acqChannel === 'referral') state.activeSignals.add('acq-referral');
}

var RELEVANCE_THRESHOLD = 3;

function computeRelevantFeatures() {
  var u = state.user;
  var relevant = new Set();
  var relevanceScores = {};

  FEATURES.forEach(function(f) {
    var mindsetScore = (u.mindsetVector || {})[f.id] || 0;
    var promptScore = (u.promptSynthesis || {})[f.id] || 0;
    var relevance = mindsetScore + promptScore;

    relevanceScores[f.id] = relevance;

    if (relevance >= RELEVANCE_THRESHOLD) {
      relevant.add(f.id);
    }
  });

  relevant.add('hire-team');

  state.relevantFeatures = relevant;
  state.relevanceScores = relevanceScores;
  return relevant;
}

// ══════════════════════════════════════════════════════════════════════════════
// 9. Scoring
// ══════════════════════════════════════════════════════════════════════════════

function scaleByCount(signalId, baseWeight) {
  if (!REPEATABLE_SIGNALS.has(signalId)) return baseWeight;
  var count = state.signalCounts[signalId] || 0;
  if (count <= 0) return 0;
  return baseWeight * Math.log2(count + 1);
}

function calculateScores() {
  var scores = {};

  FEATURES.forEach(function(f) {
    var direct = 0;
    var universal = 0;
    var directSignals = [];
    var universalSignals = [];

    state.activeSignals.forEach(function(sig) {
      var directBase = (DIRECT_MAP[sig] && DIRECT_MAP[sig][f.id]) || 0;
      if (directBase) {
        var scaled = scaleByCount(sig, directBase);
        direct += scaled;
        directSignals.push({
          name: sig,
          weight: directBase,
          count: state.signalCounts[sig] || 1,
          scaled: Math.round(scaled * 10) / 10
        });
      }
      if (UNIVERSAL_MAP[sig]) {
        var uScaled = scaleByCount(sig, UNIVERSAL_MAP[sig]);
        universal += uScaled;
        universalSignals.push({
          name: sig,
          weight: UNIVERSAL_MAP[sig],
          count: state.signalCounts[sig] || 1,
          scaled: Math.round(uScaled * 10) / 10
        });
      }
    });

    var universalContrib = universal * CONFIG.UNIVERSAL_MULTIPLIER;
    var total = Math.max(0, direct + universalContrib);

    scores[f.id] = {
      direct: Math.round(direct * 10) / 10,
      universalRaw: Math.round(universal * 10) / 10,
      universalContrib: Math.round(universalContrib * 10) / 10,
      total: Math.round(total * 10) / 10,
      directSignals: directSignals,
      universalSignals: universalSignals
    };
  });

  state.featureScores = scores;
  return scores;
}

// ══════════════════════════════════════════════════════════════════════════════
// 10. Guardrails (simplified for randomizer)
// ══════════════════════════════════════════════════════════════════════════════

function checkGuardrails(featureId) {
  var reasons = [];
  var pass = true;

  // Intent floor
  var intentFloor = 0;
  state.activeSignals.forEach(function(sig) {
    if (UNIVERSAL_MAP[sig]) intentFloor += UNIVERSAL_MAP[sig];
  });
  if (intentFloor < CONFIG.INTENT_FLOOR) {
    reasons.push('Global intent too low (' + intentFloor + ' < ' + CONFIG.INTENT_FLOOR + ')');
    pass = false;
  }

  return { pass: pass, reasons: reasons };
}

// ══════════════════════════════════════════════════════════════════════════════
// 11. Evaluate and fire
// ══════════════════════════════════════════════════════════════════════════════

function evaluateAndFire() {
  var scores = calculateScores();

  var ranked = FEATURES
    .map(function(f) {
      var s = scores[f.id];
      return {
        id: f.id, name: f.name, icon: f.icon, type: f.type, verb: f.verb, does: f.does,
        direct: s.direct, universalRaw: s.universalRaw, universalContrib: s.universalContrib,
        total: s.total, directSignals: s.directSignals, universalSignals: s.universalSignals
      };
    })
    .filter(function(f) { return state.relevantFeatures.has(f.id); })
    .filter(function(f) { return f.total >= CONFIG.THRESHOLD; })
    .sort(function(a, b) { return b.total - a.total; });

  if (ranked.length === 0) return null;

  var top = ranked[0];
  var gr = checkGuardrails(top.id);

  if (gr.pass) {
    var copy = generateCopy(top);
    return { feature: top, copy: copy };
  }

  return null;
}

// ══════════════════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════════════════
// 13. Random action selection
// ══════════════════════════════════════════════════════════════════════════════

function pickRandomActions() {
  var count = 5 + Math.floor(Math.random() * 6);
  var shuffled = ACTIONS.slice().sort(function() { return Math.random() - 0.5; });
  var picked = shuffled.slice(0, count);
  picked.forEach(function(a) {
    // Repeatable actions get a random 1-5 count. Booleans get 1.
    var isRepeatable = a.signals.some(function(s) { return REPEATABLE_SIGNALS.has(s); });
    var actionCount = isRepeatable ? (1 + Math.floor(Math.random() * 5)) : 1;
    state.actionCounts[a.id] = actionCount;
    state.activeActions.add(a.id);
    a.signals.forEach(function(s) {
      state.activeSignals.add(s);
      state.signalCounts[s] = (state.signalCounts[s] || 0) + actionCount;
    });
    a._simCount = actionCount;
  });
  // Context signals (added by profileUser / addStateSignals) are boolean — count 1.
  state.activeSignals.forEach(function(s) {
    if (state.signalCounts[s] == null) state.signalCounts[s] = 1;
  });
  return picked;
}

// ══════════════════════════════════════════════════════════════════════════════
// 14. Randomize and render
// ══════════════════════════════════════════════════════════════════════════════

function randomizeAll() {
  // Reset state
  state = {
    user: {},
    activeSignals: new Set(),
    activeActions: new Set(),
    actionCounts: {},
    signalCounts: {},
    featureScores: {},
    relevantFeatures: new Set(),
    relevanceScores: {},
    featuresShownThisSession: new Set(),
    milestonesThisSession: 0,
    lastMilestoneTime: 0,
    isUserActive: false
  };

  generateUser();
  var pickedActions = pickRandomActions();
  calculateScores();
  computeRelevantFeatures();
  var milestone = evaluateAndFire();
  renderResults(pickedActions, milestone);
}

function renderResults(pickedActions, milestone) {
  var u = state.user;
  var scores = state.featureScores;
  var html = '';

  // ── USER PROFILE ──
  var tierLabel = u.countryTier === 1 ? 'Tier 1' : 'Tier 2';
  var acqLabel = u.acqChannel === 'paid' ? 'Paid' : u.acqChannel === 'referral' ? 'Referral' : 'Organic';
  html += '<div class="card">';
  html += '<div class="card-title">User Profile</div>';
  html += '<div class="profile-grid">';
  html += '<div class="profile-item"><span class="profile-label">Name</span><span class="profile-value">' + u.name + '</span></div>';
  html += '<div class="profile-item"><span class="profile-label">Role</span><span class="profile-value">' + u.role + '</span></div>';
  html += '<div class="profile-item"><span class="profile-label">Country</span><span class="profile-value">' + u.country + ' (' + tierLabel + ')</span></div>';
  html += '<div class="profile-item"><span class="profile-label">Credits</span><span class="profile-value">' + u.credits + '/100</span></div>';
  html += '<div class="profile-item"><span class="profile-label">Session</span><span class="profile-value">' + u.sessionNum + '</span></div>';
  html += '<div class="profile-item"><span class="profile-label">Acquisition</span><span class="profile-value">' + acqLabel + '</span></div>';
  html += '<div class="profile-item"><span class="profile-label">Email</span><span class="profile-value' + (u.isCompanyDomain ? ' highlight' : '') + '">' + u.name.toLowerCase() + u.email + '</span></div>';
  html += '<div class="profile-item"><span class="profile-label">Deck History</span><span class="profile-value">' + u.decksCompleted + ' made, ' + u.decksShared + ' shared</span></div>';
  html += '<div class="profile-item"><span class="profile-label">Dismissals</span><span class="profile-value">' + u.dismissals + '</span></div>';
  html += '</div></div>';

  // ── PROMPT ──
  var stakesLabel = u.audienceStakes ? u.audienceStakes.replace(/-/g, ' ') : 'unknown';
  html += '<div class="card">';
  html += '<div class="card-title">Prompt</div>';
  html += '<div class="prompt-text">"' + u.topic + '"</div>';
  html += '<div class="prompt-meta">';
  html += '<span>Audience: <strong>' + u.audience + '</strong></span>';
  html += '<span>Stakes: <strong>' + stakesLabel + '</strong></span>';
  html += '</div></div>';

  // ── ACTIONS TAKEN ──
  html += '<div class="card">';
  html += '<div class="card-title">Actions Taken (' + pickedActions.length + ' randomly selected)</div>';
  html += '<div class="actions-list">';
  pickedActions.forEach(function(a) {
    html += '<div class="action-item"><span class="action-check">\u2713</span>' + a.label + '</div>';
  });
  html += '</div></div>';

  // ── FEATURE SCORES ──
  var ranked = FEATURES
    .map(function(f) {
      var s = scores[f.id];
      return {
        id: f.id, name: f.name, icon: f.icon, type: f.type,
        direct: s.direct,
        universalContrib: s.universalContrib,
        total: s.total,
        relevance: (state.relevanceScores || {})[f.id] || 0,
        isRelevant: state.relevantFeatures.has(f.id)
      };
    })
    .sort(function(a, b) { return b.total - a.total; });

  // Find top relevant feature above threshold
  var topRelevantId = null;
  for (var i = 0; i < ranked.length; i++) {
    if (ranked[i].isRelevant && ranked[i].total >= CONFIG.THRESHOLD) {
      topRelevantId = ranked[i].id;
      break;
    }
  }

  html += '<div class="card">';
  html += '<div class="card-title">Feature Scores</div>';
  html += '<table class="score-table">';
  html += '<thead><tr><th>Feature</th><th>Fit</th><th>Action</th><th>Context</th><th>Total</th><th></th></tr></thead>';
  html += '<tbody>';
  ranked.forEach(function(f) {
    var totalClass = 'below';
    if (f.id === topRelevantId) totalClass = 'top';
    else if (f.total >= CONFIG.THRESHOLD) totalClass = 'above';

    var badgeHTML = '';
    if (!f.isRelevant) {
      badgeHTML = '<span class="badge filtered">FILTERED</span>';
    } else if (f.id === topRelevantId) {
      badgeHTML = '<span class="badge next">NEXT</span>';
    } else if (f.total >= CONFIG.THRESHOLD) {
      badgeHTML = '<span class="badge queued">QUEUED</span>';
    }

    var rowClass = !f.isRelevant ? 'filtered-row' : '';

    html += '<tr class="' + rowClass + '">';
    html += '<td class="fname">' + f.icon + ' ' + f.name + '</td>';
    html += '<td class="num">' + f.relevance + '</td>';
    html += '<td class="num">' + f.direct + '</td>';
    html += '<td class="num">' + f.universalContrib + '</td>';
    html += '<td class="total ' + totalClass + '">' + f.total + '</td>';
    html += '<td class="badge-cell">' + badgeHTML + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  // ── NUDGE FIRED ──
  html += '<div class="card">';
  html += '<div class="card-title">Nudge Fired</div>';

  if (milestone) {
    var f = milestone.feature;
    var copy = milestone.copy;
    var isService = f.type === 'service';

    html += '<div class="nudge-card-wrap' + (isService ? ' service' : '') + '">';
    html += '<div class="nudge-header">';
    html += '<div class="nudge-icon">' + f.icon + '</div>';
    html += '<div class="nudge-tag">' + (isService ? 'Service' : 'Milestone') + '</div>';
    html += '</div>';
    html += '<div class="nudge-body">';
    html += '<div class="nudge-title">' + copy.title + '</div>';
    html += '<div class="nudge-desc">' + copy.body + '</div>';
    html += '<div class="nudge-actions">';
    html += '<button class="nudge-cta' + (isService ? ' service' : '') + '">' + (isService ? 'Talk to our team' : 'See Pro Plans') + '</button>';
    html += '<button class="nudge-dismiss">Not now</button>';
    html += '</div></div>';
    html += '<div class="nudge-footer">';
    html += '<span class="nudge-pro-badge' + (isService ? ' service' : '') + '">' + (isService ? 'SERVICE' : 'PRO') + '</span>';
    html += '<span class="nudge-feature-label">' + f.name + '</span>';
    html += '</div></div>';

    // Explanation meta
    // Find which active signal best triggered this sub-feature
    var triggerSignal = 'context signals';
    if (f.directSignals && f.directSignals.length > 0) {
      // Find signals that are from actions (not context layers)
      var actionSignalNames = [];
      pickedActions.forEach(function(a) {
        a.signals.forEach(function(s) { actionSignalNames.push(s); });
      });
      var matchedTrigger = f.directSignals.filter(function(ds) {
        return actionSignalNames.indexOf(ds.name) !== -1;
      }).sort(function(a, b) { return b.weight - a.weight; });
      if (matchedTrigger.length > 0) {
        triggerSignal = matchedTrigger[0].name + ' (active)';
      }
    }

    html += '<div class="nudge-meta">';
    html += '<strong>Sub-feature:</strong> ' + copy.title + '<br>';
    html += '<strong>Why:</strong> ' + triggerSignal + ' matched this sub-feature\'s trigger signals<br>';
    html += '<strong>Score:</strong> ' + f.total + ' (Direct: ' + f.direct + ' + Context: ' + f.universalContrib + ')';
    html += '</div>';

  } else {
    html += '<div class="no-nudge">';
    html += '<div class="no-nudge-icon">&#x1F6AB;</div>';
    html += 'No nudge fired \u2014 scores below threshold (' + CONFIG.THRESHOLD + ')';
    html += '</div>';
  }

  html += '</div>';

  document.getElementById('results').innerHTML = html;
}
