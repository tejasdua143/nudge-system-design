<!-- 
    REUSABLE HEADER COMPONENT
    =========================
    
    This file documents the header structure used across all HTML pages.
    The header follows Gamma's two-row design:
    
    ROW 1 (Top): Logo (left) | Log In + Theme Toggle (right)
    ROW 2 (Bottom): Navigation tabs (left) | Search (right)
    
    IMPORTANT: Since we're using static HTML, copy this header structure
    into each HTML file and adjust paths based on file location.
    
    PATH ADJUSTMENTS:
    - Root level (docs/): 
      * Logo: assets/presentations_ai_white.svg
      * Overview: index.html
      * API Ref: quickstart.html
      
    - One level (v1/, register/):
      * Logo: ../assets/presentations_ai_white.svg
      * Overview: ../index.html
      * API Ref: ../quickstart.html
      
    - Two levels (mcp-v1/, credits/):
      * Logo: ../../assets/presentations_ai_white.svg
      * Overview: ../../index.html
      * API Ref: ../../quickstart.html
    
    ACTIVE TAB:
    - Set active tab by using bg-accent-blue class on the appropriate nav link
    - Overview page: Overview link gets bg-accent-blue
    - All other pages: API Reference link gets bg-accent-blue
-->

<!-- HEADER STRUCTURE (Two-Row Design) -->
<header class="bg-primary-blue text-white sticky top-0 z-50">
    <div class="max-w-full mx-auto">
        <!-- Top Row: Logo and Login/Theme -->
        <div class="flex items-center justify-between h-12 px-6 border-b border-blue-800/50">
            <div class="flex items-center space-x-3">
                <img id="header-logo" src="PATH_TO_LOGO" alt="Presentations.AI" class="h-8" style="max-width: 180px;">
            </div>
            <div class="flex items-center space-x-4">
                <a id="login-link" href="/docs/login" class="text-white hover:text-gray-200 text-sm">Log In</a>
                <script>
                    (function() {
                        const hostname = window.location.hostname;
                        let loginUrl;
                        if (hostname.includes('dev-apis') || hostname.includes('devmcp')) {
                            loginUrl = 'https://dev-apis.presentations.ai/docs/login';
                        } else if (hostname.includes('developers')) {
                            loginUrl = 'https://developers.presentations.ai/docs/login';
                        } else {
                            loginUrl = window.location.origin + '/docs/login';
                        }
                        const loginLink = document.getElementById('login-link');
                        if (loginLink) {
                            loginLink.href = loginUrl;
                        }
                    })();
                </script>
                <button class="text-white hover:text-gray-200 p-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                </button>
            </div>
        </div>
        <!-- Bottom Row: Navigation and Search -->
        <div class="flex items-center justify-between h-12 px-6">
            <nav class="hidden md:flex items-center space-x-1">
                <a href="PATH_TO_OVERVIEW" class="OVERVIEW_CLASS">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                    <span>Overview</span>
                </a>
                <a href="PATH_TO_API_REF" class="API_REF_CLASS">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                    </svg>
                    <span>API Reference</span>
                </a>
            </nav>
            <div class="flex items-center">
                <div class="relative">
                    <input type="text" placeholder="Search" class="bg-blue-900/50 border border-blue-700 text-white placeholder-gray-300 px-3 py-1.5 rounded text-sm w-40 focus:outline-none focus:ring-1 focus:ring-blue-400 focus:border-blue-400">
                    <span class="absolute right-2.5 top-1.5 text-gray-400 text-xs">⌘K</span>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- 
    CLASSES:
    - Active tab: px-3 py-1.5 rounded-md bg-accent-blue text-white text-sm font-medium flex items-center space-x-1.5
    - Inactive tab: px-3 py-1.5 rounded-md text-white hover:bg-blue-800 text-sm font-medium flex items-center space-x-1.5
    
    SIDEBAR POSITIONING:
    - Header is now 24 units tall (h-12 + h-12 = 24)
    - Sidebars should use: sticky top-24 h-[calc(100vh-6rem)]
-->
