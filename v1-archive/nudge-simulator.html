<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nudge Simulator — Presentations.AI</title>
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #141416;
    --surface-2: #1c1c20;
    --surface-3: #242428;
    --border: #2a2a30;
    --border-hover: #3a3a42;
    --text: #e8e8ec;
    --text-secondary: #8e8e96;
    --text-muted: #5c5c64;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --green: #00b894;
    --amber: #fdcb6e;
    --orange: #e17055;
    --red: #d63031;
    --blue: #74b9ff;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header h1 span { color: var(--accent-light); }
  .header-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 3px;
  }
  .header-tab {
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-secondary);
    border: none;
    background: none;
    transition: all 0.15s;
  }
  .header-tab.active {
    background: var(--accent);
    color: white;
  }
  .header-tab:hover:not(.active) {
    color: var(--text);
  }

  /* Layout */
  .app { display: flex; height: calc(100vh - 65px); }

  /* Input Panel */
  .input-panel {
    width: 380px;
    min-width: 380px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--surface);
  }
  .input-section {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .input-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* Form controls */
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  input[type="text"], select {
    width: 100%;
    padding: 8px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 12px;
  }
  input[type="text"]:focus, select:focus {
    border-color: var(--accent);
  }
  select { cursor: pointer; }
  select option { background: var(--surface-2); }

  /* Archetype cards */
  .archetype-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .archetype-card {
    padding: 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface-2);
    text-align: center;
  }
  .archetype-card:hover { border-color: var(--border-hover); }
  .archetype-card.active {
    border-color: var(--accent);
    background: rgba(108, 92, 231, 0.1);
  }
  .archetype-card .emoji { font-size: 20px; margin-bottom: 4px; }
  .archetype-card .name { font-size: 11px; font-weight: 500; }

  /* Credit slider */
  .credit-slider-wrap {
    position: relative;
    margin: 8px 0 4px;
  }
  input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: white;
    border: 2px solid var(--accent);
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .credit-display {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .credit-value {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .credit-label {
    font-size: 12px;
    color: var(--text-secondary);
  }
  .credit-thresholds {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Chip selectors */
  .chip-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface-2);
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--border-hover); color: var(--text); }
  .chip.active {
    border-color: var(--accent);
    background: rgba(108, 92, 231, 0.15);
    color: var(--accent-light);
  }

  /* Session toggle */
  .session-toggle {
    display: flex;
    gap: 4px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 3px;
  }
  .session-btn {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: none;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .session-btn.active {
    background: var(--accent);
    color: white;
  }

  /* Output Panel */
  .output-panel {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    background: var(--bg);
  }

  /* Detected archetype badge */
  .detected-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    background: rgba(108, 92, 231, 0.12);
    color: var(--accent-light);
    border: 1px solid rgba(108, 92, 231, 0.25);
    margin-bottom: 24px;
  }

  /* Nudge preview card */
  .nudge-preview {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .nudge-preview-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nudge-type-badge {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 4px 10px;
    border-radius: 4px;
  }
  .nudge-type-badge.low { background: rgba(0,184,148,0.15); color: var(--green); }
  .nudge-type-badge.medium { background: rgba(253,203,110,0.15); color: var(--amber); }
  .nudge-type-badge.medium-high { background: rgba(225,112,85,0.15); color: var(--orange); }
  .nudge-type-badge.passive { background: rgba(116,185,255,0.15); color: var(--blue); }
  .nudge-intensity { font-size: 12px; color: var(--text-muted); }

  /* Nudge visual mockup */
  .nudge-mockup {
    padding: 24px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }
  .mockup-shell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    max-width: 480px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .mockup-shell.compact { max-width: 340px; }
  .mockup-shell.expanded { max-width: 520px; }

  .mockup-icon-title {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px 8px;
  }
  .mockup-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .mockup-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
  }
  .mockup-body {
    padding: 4px 20px 12px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-secondary);
  }
  .mockup-proof {
    margin: 4px 20px 12px;
    padding: 10px 14px;
    background: rgba(108, 92, 231, 0.08);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--accent-light);
    font-weight: 500;
  }
  .mockup-visual {
    display: flex;
    gap: 12px;
    padding: 0 20px 16px;
  }
  .mockup-visual-box {
    flex: 1;
    height: 80px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
  }
  .mockup-visual-box.with-watermark {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .mockup-visual-box.without-watermark {
    background: rgba(0,184,148,0.1);
    border: 1px solid rgba(0,184,148,0.3);
    color: var(--green);
  }
  .mockup-cta {
    display: flex;
    gap: 8px;
    padding: 4px 20px 16px;
  }
  .mockup-btn {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    border: none;
    cursor: default;
  }
  .mockup-btn.primary {
    background: var(--accent);
    color: white;
  }
  .mockup-btn.secondary {
    background: var(--surface-3);
    color: var(--text-secondary);
  }
  .mockup-dismiss {
    padding: 8px 20px 14px;
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
  }
  .mockup-dismiss span { cursor: default; }

  /* Copy detail section */
  .copy-detail {
    padding: 20px;
  }
  .copy-row {
    margin-bottom: 16px;
  }
  .copy-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .copy-value {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
  }

  /* Component composition */
  .composition-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .composition-card h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .comp-tree {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.8;
    color: var(--text-secondary);
  }
  .comp-tree .tag { color: var(--accent-light); }
  .comp-tree .prop { color: var(--green); }
  .comp-tree .val { color: var(--amber); }

  /* Rules check */
  .rules-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .rules-card h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .rule-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    font-size: 13px;
  }
  .rule-status {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }
  .rule-status.pass { background: rgba(0,184,148,0.15); color: var(--green); }
  .rule-status.fail { background: rgba(214,48,49,0.15); color: var(--red); }
  .rule-status.warn { background: rgba(253,203,110,0.15); color: var(--amber); }

  /* Credit meter mockup */
  .credit-meter-mockup {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .credit-meter-bar {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: var(--surface-3);
    overflow: hidden;
  }
  .credit-meter-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s, background 0.3s;
  }
  .credit-meter-text {
    font-size: 12px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    min-width: 65px;
    text-align: right;
  }

  /* Suppressed state */
  .suppressed-overlay {
    padding: 40px;
    text-align: center;
    color: var(--text-muted);
  }
  .suppressed-overlay .icon { font-size: 32px; margin-bottom: 12px; }
  .suppressed-overlay .title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
  .suppressed-overlay .desc { font-size: 13px; line-height: 1.5; }

  /* Journey simulator */
  .journey-panel { display: none; }
  .journey-panel.active { display: flex; flex-direction: column; height: 100%; }

  .journey-controls {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .journey-btn {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border);
    cursor: pointer;
    background: var(--surface-2);
    color: var(--text);
    transition: all 0.15s;
  }
  .journey-btn:hover { border-color: var(--accent); }
  .journey-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .journey-btn:disabled {
    opacity: 0.4;
    cursor: default;
  }
  .journey-step-counter {
    font-size: 13px;
    color: var(--text-secondary);
    margin-left: auto;
  }

  .journey-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  .journey-step-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    opacity: 0.4;
    transition: opacity 0.3s;
  }
  .journey-step-card.active { opacity: 1; border-color: var(--accent); }
  .journey-step-card.done { opacity: 0.7; }

  .journey-step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .journey-step-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--surface-3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .journey-step-card.active .journey-step-num { background: var(--accent); }
  .journey-step-card.done .journey-step-num { background: var(--green); }
  .journey-step-action { font-size: 14px; font-weight: 500; }
  .journey-step-response {
    margin-left: 34px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .journey-nudge-fired {
    margin-left: 34px;
    margin-top: 8px;
    padding: 10px 14px;
    background: rgba(108, 92, 231, 0.08);
    border: 1px solid rgba(108, 92, 231, 0.2);
    border-radius: var(--radius-sm);
    font-size: 12px;
  }
  .journey-nudge-fired .nf-type {
    font-weight: 600;
    color: var(--accent-light);
    margin-bottom: 4px;
  }
  .journey-nudge-fired .nf-copy {
    color: var(--text-secondary);
    line-height: 1.4;
  }
  .journey-no-nudge {
    margin-left: 34px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
  }
  .journey-status-bar {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 24px;
    font-size: 12px;
    background: var(--surface);
  }
  .journey-stat-label { color: var(--text-muted); }
  .journey-stat-value { font-weight: 600; margin-left: 6px; }

  /* Auto-detect result */
  .auto-detect-result {
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(108,92,231,0.08);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--accent-light);
    display: none;
  }
  .auto-detect-result.visible { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border); }
</style>
</head>
<body>

<div class="header">
  <h1><span>Nudge</span> Simulator</h1>
  <div class="header-tabs">
    <button class="header-tab active" onclick="switchMode('sandbox')">Sandbox</button>
    <button class="header-tab" onclick="switchMode('journey')">Journey Simulator</button>
  </div>
</div>

<div class="app">
  <!-- INPUT PANEL -->
  <div class="input-panel" id="inputPanel">

    <!-- SANDBOX INPUTS -->
    <div id="sandboxInputs">
      <!-- Auto-detect section -->
      <div class="input-section">
        <div class="input-section-title">Auto-Detect Archetype</div>
        <label>Role</label>
        <input type="text" id="roleInput" placeholder="e.g. founder, teacher, sales..." oninput="autoDetect()">
        <label>Audience</label>
        <input type="text" id="audienceInput" placeholder="e.g. investors, students, clients..." oninput="autoDetect()">
        <label>Topic / Prompt</label>
        <input type="text" id="topicInput" placeholder="e.g. Series A pitch for TechCo..." oninput="autoDetect()">
        <div class="auto-detect-result" id="autoDetectResult"></div>
      </div>

      <!-- Manual archetype -->
      <div class="input-section">
        <div class="input-section-title">Or Select Archetype</div>
        <div class="archetype-grid" id="archetypeGrid"></div>
      </div>

      <!-- Session -->
      <div class="input-section">
        <div class="input-section-title">Session</div>
        <div class="session-toggle">
          <button class="session-btn active" onclick="setSession(1)">Session 1</button>
          <button class="session-btn" onclick="setSession(2)">Session 2</button>
        </div>
      </div>

      <!-- Credits -->
      <div class="input-section">
        <div class="input-section-title">Credits</div>
        <div class="credit-display">
          <div>
            <div class="credit-value" id="creditValue">200</div>
            <div class="credit-label">of 200 free credits</div>
          </div>
        </div>
        <input type="range" id="creditSlider" min="0" max="200" value="200" oninput="updateCredits()">
        <div class="credit-thresholds">
          <span>0</span><span>25</span><span>50</span><span>100</span><span>200</span>
        </div>
      </div>

      <!-- Micro-phase -->
      <div class="input-section">
        <div class="input-section-title">Micro-Phase</div>
        <div class="chip-group" id="phaseChips"></div>
      </div>

      <!-- Trigger -->
      <div class="input-section">
        <div class="input-section-title">Trigger / Pro Feature</div>
        <div class="chip-group" id="triggerChips"></div>
      </div>
    </div>

    <!-- JOURNEY INPUTS -->
    <div id="journeyInputs" style="display:none">
      <div class="input-section">
        <div class="input-section-title">Select Persona</div>
        <div id="personaCards"></div>
      </div>
    </div>
  </div>

  <!-- OUTPUT PANEL -->
  <div class="output-panel" id="outputPanel">
    <!-- Sandbox output -->
    <div id="sandboxOutput"></div>
    <!-- Journey output -->
    <div id="journeyOutput" class="journey-panel"></div>
  </div>
</div>

<script>
// ============================================================
// DATA: Copy Matrix, Archetypes, Nudge Types, Rules
// ============================================================

const ARCHETYPES = [
  { id: 'founder', name: 'Founder / Pitcher', emoji: '🚀', tone: 'Aspirational, high-stakes',
    roleMatch: ['founder','ceo','co-founder','exec','entrepreneur','cto','coo'],
    audienceMatch: ['investors','investor','vcs','vc','board'],
    topicMatch: ['pitch','fundraise','series','seed','investor','startup','raise','funding'] },
  { id: 'sales', name: 'Sales / Marketing', emoji: '💼', tone: 'ROI-driven, professional',
    roleMatch: ['sales','marketing','growth','bd','account exec','account manager','sdr','ae'],
    audienceMatch: ['clients','prospects','customers','client','prospect','customer'],
    topicMatch: ['sales','proposal','pricing','product','client','deal','revenue','pipeline'] },
  { id: 'educator', name: 'Educator', emoji: '📚', tone: 'Supportive, empowering',
    roleMatch: ['teacher','professor','trainer','instructor','lecturer','tutor'],
    audienceMatch: ['students','trainees','class','learners','student'],
    topicMatch: ['lecture','course','lesson','training','class','curriculum','education','biology','math','history','science'] },
  { id: 'corporate', name: 'Corporate / Internal', emoji: '🏢', tone: 'Professional, credibility',
    roleMatch: ['manager','analyst','pm','consultant','director','vp','head of'],

function autoDetect() {
  const role = document.getElementById('roleInput').value.toLowerCase().trim();
  const audience = document.getElementById('audienceInput').value.toLowerCase().trim();
  const topic = document.getElementById('topicInput').value.toLowerCase().trim();

  if (!role && !audience && !topic) {
    document.getElementById('autoDetectResult').classList.remove('visible');
    return;
  }

  let detected = null;
  for (const a of ARCHETYPES) {
    if (a.id === 'fallback') continue;
    if (a.roleMatch.some(r => role.includes(r))) { detected = a; break; }
    if (a.audienceMatch.some(r => audience.includes(r))) { detected = a; break; }
    if (a.topicMatch.some(r => topic.includes(r))) { detected = a; break; }
  }

  const el = document.getElementById('autoDetectResult');
  if (detected) {
    el.innerHTML = `Detected: <strong>${detected.emoji} ${detected.name}</strong> — ${detected.tone}`;
    el.classList.add('visible');
    state.archetype = detected.id;
    renderArchetypeGrid();
    updateOutput();
  } else {
    el.innerHTML = `No strong match — using <strong>📄 Fallback</strong>`;
    el.classList.add('visible');
    state.archetype = 'fallback';
    renderArchetypeGrid();
    updateOutput();
  }
}

function resolveNudge() {
  const { archetype, session, credits, phase, trigger } = state;

  // Phase-based decisions
  if (phase === 'create_flow') {
    return { suppressed: true, reason: 'Create flow — zero nudges. Signals collected silently.' };
  }

  if (phase === 'first_editor') {
    return {
      type: 'credit_meter',

      position: 'fixed',

      dismiss: [],

  if (phase === 'feature_explore') {

    return {
      type: 'inline_hint',
      typeName: 'Inline Hint',
      intensity: 'low',
      size: 'compact',
      position: 'anchored',
      title: hoverCopy,
      body: null,
      primaryCTA: null,
      secondaryCTA: null,
      dismiss: ['auto-dismiss on mouse-out'],

  if (phase === 'gate_hit') {
    const copyKey = 'gate_' + trigger;

      type: 'credit_alert',

      size: 'standard',
      position: 'overlay',

      composition: 'Shell(expanded, overlay) + Icon(export) + Title + ValueProp + Proof(comparison) + Visual(before-after) + CTA(primary+secondary) + Dismiss(close+later+never)',
      icon: '📄'
    };

    const copy = COPY_MATRIX.celebration[archetype];

      type: 'celebration_card',
      typeName: 'Celebration Card',
      intensity: 'medium',

      composition: 'Shell(standard, overlay) + Icon(celebration) + Title + ValueProp + CTA(primary+secondary) + Dismiss(close)',

  return { suppressed: true, reason: 'Unknown phase.' };

function getCreditState() {
  if (state.credits > 100) return 'green';
  if (state.credits > 50) return 'amber';
  if (state.credits > 25) return 'orange';
  if (state.credits > 0) return 'red';
  return 'depleted';
}

function evaluateRules(nudge) {
  const rules = [];
  const { session, phase } = state;

  // Create flow
  rules.push({
    name: 'Create flow: zero nudges',
    pass: phase !== 'create_flow' || nudge.suppressed,
    detail: phase === 'create_flow' ? 'In create flow — no nudges allowed' : 'Not in create flow'
  });

  // No modals in S1
  const isModal = nudge.type === 'modal';
  rules.push({
    name: 'No modals in Session 1',
    pass: session !== 1 || !isModal,
    detail: session === 1 ? 'Session 1 — max intensity is Slide-over Panel' : 'Session 2 — modals allowed'
  });

  // Session cap
  const cap = session === 1 ? 3 : 2;
  rules.push({
    name: `Session ${session} cap: ${cap} active nudges`,
    pass: true, // in sandbox we can't track real count
    detail: `Max ${cap} active nudges per session (simulated: within cap)`,
    warn: true
  });

  // No interruption during active work
  rules.push({
    name: 'No interruption during active work',
    pass: true,
    detail: 'Nudge waits for 3+ second pause in user activity'
  });

  // Credit depletion override
  if (state.credits === 0 && phase === 'credit_milestone') {
    rules.push({
      name: 'Credit depletion override',
      pass: true,
      detail: 'Depleted state always shows — functional blocker, not counted toward cap'
    });
  }

  // Banner only in Session 2
  if (nudge.type === 'banner') {
    rules.push({
      name: 'Banner: Session 2 only',
      pass: session === 2,
      detail: session === 1 ? 'Banners not allowed in Session 1' : 'Session 2 — banner allowed'
    });
  }

  return rules;
}

        ${nudge.primaryCTA ? `<div class="copy-row"><div class="copy-label">Primary CTA</div><div class="copy-value">${nudge.primaryCTA}</div></div>` : ''}
        ${nudge.secondaryCTA ? `<div class="copy-row"><div class="copy-label">Secondary CTA</div><div class="copy-value">${nudge.secondaryCTA}</div></div>` : ''}
        <div class="copy-row">
          <div class="copy-label">Dismiss Options</div>
          <div class="copy-value">${nudge.dismiss.length ? nudge.dismiss.join(' · ') : 'None (functional blocker)'}</div>
        </div>
      </div>
    </div>

    <div class="composition-card">
      <h3>Component Composition</h3>
      <div class="comp-tree">${renderCompositionTree(nudge)}</div>
    </div>

    <div class="rules-card">
      <h3>Rules Engine Check</h3>
      ${rules.map(r => `
        <div class="rule-row">
          <div class="rule-status ${r.pass ? (r.warn ? 'warn' : 'pass') : 'fail'}">${r.pass ? (r.warn ? '~' : '✓') : '✕'}</div>
          <div>
            <div style="font-weight:500">${r.name}</div>
            <div style="font-size:12px;color:var(--text-muted)">${r.detail}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderCreditMeter() {
  const pct = state.credits / 200 * 100;
  const cs = getCreditState();
  const colors = { green: 'var(--green)', amber: 'var(--amber)', orange: 'var(--orange)', red: 'var(--red)', depleted: 'var(--red)' };
  return `
    <div class="credit-meter-mockup">
      <span style="font-size:14px">⚡</span>
      <div class="credit-meter-bar">
        <div class="credit-meter-fill" style="width:${pct}%;background:${colors[cs]}"></div>
      </div>
      <div class="credit-meter-text" style="color:${colors[cs]}">${state.credits} / 200</div>
    </div>
  `;
}

function renderMockup(nudge) {
  if (nudge.type === 'credit_meter') {
    return `<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">Credit meter is a passive, always-visible component in the editor header/sidebar.</div>`;
  }

  const sizeClass = nudge.size === 'compact' ? 'compact' : nudge.size === 'expanded' ? 'expanded' : '';
  const iconBg = {
    '🎨': 'rgba(108,92,231,0.15)', '📄': 'rgba(116,185,255,0.15)', '✨': 'rgba(253,203,110,0.15)',
    '📊': 'rgba(0,184,148,0.15)', '👥': 'rgba(162,155,254,0.15)', '🖼': 'rgba(225,112,85,0.15)',
    '⚡': 'rgba(253,203,110,0.15)', '🎉': 'rgba(0,184,148,0.15)', '👋': 'rgba(116,185,255,0.15)', '🔒': 'rgba(214,48,49,0.15)'
  };

  return `
    <div class="mockup-shell ${sizeClass}">
      <div class="mockup-icon-title">
        <div class="mockup-icon" style="background:${iconBg[nudge.icon] || 'var(--surface-3)'}">${nudge.icon}</div>
        <div class="mockup-title">${nudge.title}</div>
      </div>
      ${nudge.body ? `<div class="mockup-body">${nudge.body}</div>` : ''}
      ${nudge.proof ? `<div class="mockup-proof">📊 ${nudge.proof}</div>` : ''}
      ${nudge.visual ? `
        <div class="mockup-visual">
          <div class="mockup-visual-box with-watermark">With watermark</div>
          <div class="mockup-visual-box without-watermark">Without (Pro)</div>
        </div>
      ` : ''}
      ${nudge.primaryCTA ? `
        <div class="mockup-cta">
          <div class="mockup-btn primary">${nudge.primaryCTA}</div>
          ${nudge.secondaryCTA ? `<div class="mockup-btn secondary">${nudge.secondaryCTA}</div>` : ''}
        </div>
      ` : ''}
      ${nudge.dismiss.length ? `
        <div class="mockup-dismiss">
          ${nudge.dismiss.map(d => `<span>${d}</span>`).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

function renderCompositionTree(nudge) {
  const parts = nudge.composition.split(' + ');
  let html = `<span class="tag">&lt;NudgeShell</span> <span class="prop">type</span>=<span class="val">"${nudge.type}"</span> <span class="prop">size</span>=<span class="val">"${nudge.size}"</span> <span class="prop">position</span>=<span class="val">"${nudge.position}"</span><span class="tag">&gt;</span><br>`;
  parts.forEach((p, i) => {
    if (i === 0) return;
    const isLast = i === parts.length - 1;
    html += `  ${isLast ? '└' : '├'}── <span class="tag">&lt;${p.trim()}</span> <span class="tag">/&gt;</span><br>`;
  });
  html += `<span class="tag">&lt;/NudgeShell&gt;</span>`;
  return html;
}

function renderPersonaCards() {
  const el = document.getElementById('personaCards');
  el.innerHTML = PERSONAS.map(p => `
    <div class="archetype-card ${state.journeyPersona === p.id ? 'active' : ''}" onclick="selectPersona('${p.id}')" style="display:flex;align-items:center;gap:10px;text-align:left;padding:14px;margin-bottom:8px">
      <div class="emoji" style="font-size:28px;margin:0">${p.emoji}</div>
      <div>
        <div class="name" style="font-size:13px;font-weight:600">${p.name}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${p.desc}</div>
      </div>
    </div>
  `).join('');
}

function selectPersona(id) {
  state.journeyPersona = id;
  state.journeyStep = -1;
  renderPersonaCards();
  renderJourney();
}

function renderJourney() {
  const persona = PERSONAS.find(p => p.id === state.journeyPersona);
  if (!persona) {
    document.getElementById('journeyOutput').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">Select a persona to begin the journey simulation.</div>';
    return;
  }

  const el = document.getElementById('journeyOutput');
  const step = state.journeyStep;
  const totalSteps = persona.steps.length;

  let capS1 = 0, capS2 = 0;
  for (let i = 0; i <= step && i < totalSteps; i++) {
    const s = persona.steps[i];
    if (s.capCount) {
      if (s.session === 2) capS2 = s.capCount;
      else capS1 = s.capCount;
    }
  }
  const currentCredits = step >= 0 && step < totalSteps ? persona.steps[step].credits : 200;
  const currentSession = step >= 0 && step < totalSteps && persona.steps[step].session === 2 ? 2 : 1;

  el.innerHTML = `
    <div class="journey-controls">
      <button class="journey-btn" onclick="journeyReset()" ${step < 0 ? 'disabled' : ''}>Reset</button>
      <button class="journey-btn primary" onclick="journeyNext()" ${step >= totalSteps - 1 ? 'disabled' : ''}>
        ${step < 0 ? 'Start Journey' : 'Next Step →'}
      </button>
      <div class="journey-step-counter">${step < 0 ? 'Ready' : `Step ${step + 1} / ${totalSteps}`}</div>
    </div>
    <div class="journey-content">
      ${persona.steps.map((s, i) => `
        <div class="journey-step-card ${i === step ? 'active' : i < step ? 'done' : ''}" ${i > step ? 'style="opacity:0.25"' : ''}>
          <div class="journey-step-header">
            <div class="journey-step-num">${i + 1}</div>
            <div class="journey-step-action">${s.action}</div>
          </div>
          ${i <= step ? `
            <div class="journey-step-response">${s.reason}</div>
            ${s.nudgeDetail ? `
              <div class="journey-nudge-fired">
                <div class="nf-type">${s.nudgeDetail.type}${s.capCount ? ` — counts as nudge #${s.capCount}` : ''}</div>
                <div class="nf-copy">${s.nudgeDetail.copy}</div>
              </div>
            ` : s.nudge === 'credit_meter' ? `
              <div class="journey-no-nudge">Credit meter appears (passive)</div>
            ` : s.converted ? `
              <div class="journey-nudge-fired" style="background:rgba(0,184,148,0.08);border-color:rgba(0,184,148,0.2)">
                <div class="nf-type" style="color:var(--green)">Converted to Pro!</div>
                <div class="nf-copy">All nudges permanently suppressed.</div>
              </div>
            ` : `
              <div class="journey-no-nudge">No nudge fires</div>
            `}
          ` : ''}
        </div>
      `).join('')}
    </div>
    <div class="journey-status-bar">
      <div>
        <span class="journey-stat-label">Credits:</span>
        <span class="journey-stat-value" style="color:${currentCredits > 100 ? 'var(--green)' : currentCredits > 50 ? 'var(--amber)' : currentCredits > 25 ? 'var(--orange)' : 'var(--red)'}">${currentCredits} / 200</span>
      </div>
      <div>
        <span class="journey-stat-label">Session:</span>
        <span class="journey-stat-value">${currentSession}</span>
      </div>
      <div>
        <span class="journey-stat-label">Nudge Cap (S1):</span>
        <span class="journey-stat-value" style="color:${capS1 >= 3 ? 'var(--red)' : 'var(--green)'}">${capS1} / 3</span>
      </div>
      <div>
        <span class="journey-stat-label">Nudge Cap (S2):</span>
        <span class="journey-stat-value">${capS2} / 2</span>
      </div>
      <div>
        <span class="journey-stat-label">Archetype:</span>
        <span class="journey-stat-value">${persona.emoji} ${ARCHETYPES.find(a=>a.id===persona.archetype).name}</span>
      </div>
    </div>
  `;
}

function journeyNext() {
  const persona = PERSONAS.find(p => p.id === state.journeyPersona);
  if (!persona) return;
  if (state.journeyStep < persona.steps.length - 1) {
    state.journeyStep++;
    renderJourney();
    // scroll active step into view
    setTimeout(() => {
      const active = document.querySelector('.journey-step-card.active');
      if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  }
}

function journeyReset() {
  state.journeyStep = -1;
  renderJourney();
}

function switchMode(mode) {
  state.mode = mode;
  document.querySelectorAll('.header-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.header-tab:${mode === 'sandbox' ? 'first' : 'last'}-child`).classList.add('active');

  if (mode === 'sandbox') {
    document.getElementById('sandboxInputs').style.display = '';
    document.getElementById('journeyInputs').style.display = 'none';
    document.getElementById('sandboxOutput').style.display = '';
    document.getElementById('journeyOutput').classList.remove('active');
    updateOutput();
  } else {
    document.getElementById('sandboxInputs').style.display = 'none';
    document.getElementById('journeyInputs').style.display = '';
    document.getElementById('sandboxOutput').style.display = 'none';
    document.getElementById('journeyOutput').classList.add('active');
    renderJourney();
  }
}
