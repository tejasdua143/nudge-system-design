<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nudge Matrix — Presentations.AI</title>
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #141416;
    --surface-2: #1c1c20;
    --surface-3: #242428;
    --border: #2a2a30;
    --border-hover: #3a3a42;
    --text: #e8e8ec;
    --text-secondary: #8e8e96;
    --text-muted: #5c5c64;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --green: #00b894;
    --green-bg: rgba(0,184,148,0.08);
    --amber: #fdcb6e;
    --amber-bg: rgba(253,203,110,0.08);
    --orange: #e17055;
    --orange-bg: rgba(225,112,85,0.08);
    --red: #d63031;
    --red-bg: rgba(214,48,49,0.08);
    --blue: #74b9ff;
    --blue-bg: rgba(116,185,255,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .header h1 span { color: var(--accent-light); }
  .header-stats {
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .header-stats strong { color: var(--text); }

  /* Filter bar */
  .filter-bar {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 16px;
    align-items: flex-end;
    flex-wrap: wrap;
    position: sticky;
    top: 57px;
    z-index: 19;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
  }
  .filter-chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-chip {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 11px;
    cursor: pointer;
    background: var(--surface-2);
    color: var(--text-secondary);
    transition: all 0.12s;
    white-space: nowrap;
  }
  .filter-chip:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-chip.active {
    border-color: var(--accent);
    background: rgba(108,92,231,0.12);
    color: var(--accent-light);
  }
  .filter-search {
    flex: 1;
    min-width: 200px;
  }
  .filter-search input {
    width: 100%;
    padding: 7px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    outline: none;
  }
  .filter-search input:focus { border-color: var(--accent); }
  .filter-search input::placeholder { color: var(--text-muted); }

  /* Group by toggle */
  .group-toggle {
    display: flex;
    gap: 4px;
    background: var(--surface-2);
    border-radius: 6px;
    padding: 2px;
  }
  .group-btn {
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    font-size: 11px;
    cursor: pointer;
    background: none;
    color: var(--text-secondary);
    transition: all 0.12s;
  }
  .group-btn.active { background: var(--accent); color: white; }

  /* Table */
  .table-container {
    padding: 0 32px 80px;
    overflow-x: auto;
  }
  .group-header {
    padding: 20px 0 8px;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }
  .group-header .count {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--surface-2);
    padding: 2px 8px;
    border-radius: 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    table-layout: fixed;
  }
  thead th {
    padding: 10px 12px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 114px;
    z-index: 10;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text-secondary); }
  tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(42,42,48,0.5);
    vertical-align: top;
    line-height: 1.4;
    color: var(--text-secondary);
  }
  tbody tr:hover td { background: rgba(108,92,231,0.03); }

  /* Column widths */
  .col-phase { width: 120px; }
  .col-archetype { width: 110px; }
  .col-trigger { width: 100px; }
  .col-type { width: 110px; }
  .col-intensity { width: 80px; }
  .col-title { width: 180px; }
  .col-body { width: auto; }
  .col-cta { width: 120px; }
  .col-session { width: 60px; }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-passive { background: var(--blue-bg); color: var(--blue); }
  .badge-low { background: var(--green-bg); color: var(--green); }
  .badge-medium { background: var(--amber-bg); color: var(--amber); }
  .badge-medium-high { background: var(--orange-bg); color: var(--orange); }
  .badge-high { background: var(--red-bg); color: var(--red); }
  .badge-suppressed { background: rgba(92,92,100,0.15); color: var(--text-muted); }

  .archetype-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
  }

  .phase-badge {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .trigger-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
  }

  .nudge-title {
    font-weight: 600;
    color: var(--text);
    font-size: 12px;
  }
  .nudge-body {
    color: var(--text-secondary);
    font-size: 11px;
    line-height: 1.5;
  }
  .cta-text {
    font-size: 11px;
    color: var(--accent-light);
  }
  .cta-secondary {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .session-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--surface-3);
    color: var(--text-secondary);
  }

  /* Suppressed row */
  tr.suppressed td { opacity: 0.4; }
  tr.suppressed:hover td { opacity: 0.7; }

  /* Empty state */
  .empty-state {
    padding: 60px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* Expand row */
  .expand-row {
    cursor: pointer;
  }
  .expand-row:hover td:first-child { color: var(--accent-light); }
  .detail-row td {
    background: var(--surface) !important;
    padding: 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .detail-content {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
  .detail-block h4 {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .detail-block p {
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-secondary);
  }
  .detail-block .comp-code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    color: var(--accent-light);
    background: var(--surface-2);
    padding: 8px 12px;
    border-radius: 6px;
    line-height: 1.6;
  }
  .detail-block .dismiss-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .dismiss-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface-2);
    color: var(--text-muted);
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1><span>Nudge</span> Matrix</h1>
  <div class="header-stats">
    <span>Total nudges: <strong id="totalCount">0</strong></span>
    <span>Showing: <strong id="showingCount">0</strong></span>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-group">
    <div class="filter-label">Intensity</div>
    <div class="filter-chips" id="intensityFilters"></div>
  </div>
  <div class="filter-group">
    <div class="filter-label">Archetype</div>
    <div class="filter-chips" id="archetypeFilters"></div>
  </div>
  <div class="filter-group">
    <div class="filter-label">Phase</div>
    <div class="filter-chips" id="phaseFilters"></div>
  </div>
  <div class="filter-group">
    <div class="filter-label">Group By</div>
    <div class="group-toggle">
      <button class="group-btn active" onclick="setGroupBy('intensity')">Intensity</button>
      <button class="group-btn" onclick="setGroupBy('phase')">Phase</button>
      <button class="group-btn" onclick="setGroupBy('archetype')">Archetype</button>
      <button class="group-btn" onclick="setGroupBy('none')">None</button>
    </div>
  </div>
  <div class="filter-search">
    <input type="text" id="searchInput" placeholder="Search copy, titles, triggers..." oninput="renderMatrix()">
  </div>
</div>

<div class="table-container" id="tableContainer"></div>

<script>
// ============================================================
// DATA
// ============================================================

const ARCHETYPES = [
  { id: 'founder', name: 'Founder / Pitcher', emoji: '🚀' },
  { id: 'sales', name: 'Sales / Marketing', emoji: '💼' },
  { id: 'educator', name: 'Educator', emoji: '📚' },
  { id: 'corporate', name: 'Corporate', emoji: '🏢' },
  { id: 'creative', name: 'Creative / Freelancer', emoji: '🎨' },
  { id: 'student', name: 'Student / Personal', emoji: '🎓' },
  { id: 'fallback', name: 'Fallback', emoji: '📄' }
];

const INTENSITIES = [
  { id: 'passive', name: 'Passive', color: 'blue' },
  { id: 'low', name: 'Low', color: 'green' },
  { id: 'medium', name: 'Medium', color: 'amber' },
  { id: 'medium-high', name: 'Medium-High', color: 'orange' },
  { id: 'high', name: 'High', color: 'red' },
  { id: 'suppressed', name: 'Suppressed', color: 'muted' }
];

const PHASES = [
  { id: 'create_flow', name: 'Create Flow' },
  { id: 'first_editor', name: 'First Editor View' },
  { id: 'feature_explore', name: 'Feature Exploration' },
  { id: 'gate_hit', name: 'Gate Hit' },
  { id: 'credit_100', name: 'Credit: 100' },
  { id: 'credit_50', name: 'Credit: 50' },
  { id: 'credit_25', name: 'Credit: 25' },
  { id: 'credit_0', name: 'Credit: Depleted' },
  { id: 'export_share', name: 'Export / Share' },
  { id: 'deck_complete', name: 'Deck Complete' },
  { id: 'session_2', name: 'Session 2 Return' }
];

const TRIGGERS = [
  { id: 'branding', name: 'Branding', icon: '🎨' },
  { id: 'pdf_export', name: 'PDF Export', icon: '📄' },
  { id: 'ai_enhance', name: 'AI Enhance', icon: '✨' },
  { id: 'analytics', name: 'Analytics', icon: '📊' },
  { id: 'collaboration', name: 'Collaboration', icon: '👥' },
  { id: 'pro_template', name: 'Pro Template', icon: '🖼' },
  { id: 'credits', name: 'Credits', icon: '⚡' },
  { id: 'none', name: 'N/A', icon: '—' }
];

// Generate all nudge entries
function generateAllNudges() {
  const nudges = [];

  for (const arch of ARCHETYPES) {
    // Create flow — suppressed for all
    nudges.push({
      archetype: arch,
      phase: PHASES[0], // create_flow
      trigger: TRIGGERS.find(t=>t.id==='none'),
      nudgeType: '—',
      intensity: 'suppressed',
      title: '—',
      body: 'Zero nudges during create flow. Signals collected silently.',
      primaryCTA: '—',
      secondaryCTA: '',
      session: 'S1',
      composition: 'None',
      dismiss: [],
      suppressed: true,
      reason: 'Create flow is a signal-collection zone only'
    });

    // First editor view — credit meter only
    nudges.push({
      archetype: arch,
      phase: PHASES[1], // first_editor
      trigger: TRIGGERS.find(t=>t.id==='credits'),
      nudgeType: 'Credit Meter',
      intensity: 'passive',
      title: 'Credits: X / 200',
      body: 'Passive credit meter visible. No active nudge fires.',
      primaryCTA: '—',
      secondaryCTA: '',
      session: 'S1',
      composition: 'CreditMeter(state=green)',
      dismiss: [],
      suppressed: false,
      reason: 'Passive — does not count toward nudge cap'
    });

    // Feature explore — hover hints for each trigger
    for (const trigger of TRIGGERS.filter(t => !['credits','none'].includes(t.id))) {
      const hoverCopy = {
        founder: 'Pro — Make your pitch stand out',
        sales: 'Pro — Impress your clients',
        educator: 'Pro — Engage your students',
        corporate: 'Pro — Elevate your presentation',
        creative: 'Pro — Showcase your work',
        student: 'Pro — Level up your deck',
        fallback: 'Pro — Unlock this feature'
      };
      nudges.push({
        archetype: arch,
        phase: PHASES[2], // feature_explore
        trigger: trigger,
        nudgeType: 'Inline Hint',
        intensity: 'low',
        title: hoverCopy[arch.id],
        body: 'Auto-dismisses on mouse-out. Does not count toward session nudge cap.',
        primaryCTA: '—',
        secondaryCTA: '',
        session: 'S1',
        composition: 'Shell(compact, anchored) + Icon + Title',
        dismiss: ['auto-dismiss'],
        suppressed: false,
        reason: 'Passive hint — no cap count'
      });
    }

    // Gate hits for each trigger
    const gateData = {
      branding: {
        founder: { t: 'Present with your brand', b: 'Investors notice the details. Remove the watermark and present with your company\'s identity.' },
        sales: { t: 'Your brand, not ours', b: 'Your client should see your brand on every slide. Remove the watermark and add your colors.' },
        educator: { t: 'A clean, professional lecture', b: 'A polished presentation builds trust with your students. Remove the watermark for a distraction-free experience.' },
        corporate: { t: 'Look sharp in front of leadership', b: 'Brand consistency matters. Present with your company\'s identity, not a third-party watermark.' },
        creative: { t: 'Your portfolio, your brand', b: 'Your work should speak for itself. Remove the watermark and present under your own name.' },
        student: { t: 'Remove the watermark', b: 'Get a cleaner look by removing the Presentations.AI watermark.' },
        fallback: { t: 'Make it yours', b: 'Remove the watermark and customize your presentation with your own branding.' }
      },
      pdf_export: {
        founder: { t: 'Send your pitch as a PDF', b: 'Give investors a polished PDF they can forward to their partners and share offline.' },
        sales: { t: 'A PDF your client can share', b: 'Export a professional PDF your client can forward to decision-makers.' },
        educator: { t: 'A PDF students can study from', b: 'Give your students a PDF version they can reference anytime, anywhere.' },
        corporate: { t: 'Export for the exec team', b: 'Send leadership a polished PDF they can review on their own time.' },
        creative: { t: 'Deliver a PDF portfolio', b: 'Send clients a downloadable PDF they can review and share.' },
        student: { t: 'Download as PDF', b: 'Export your deck as a PDF to share or present offline.' },
        fallback: { t: 'Export as PDF', b: 'Download your presentation as a professional PDF.' }
      },
      ai_enhance: {
        founder: { t: 'AI that elevates your pitch', b: 'Pro AI refines your copy, improves layouts, and makes every slide investor-ready.' },
        sales: { t: 'AI that sharpens your message', b: 'Pro AI optimizes your sales copy and layouts for maximum impact.' },
        educator: { t: 'AI that enhances your lesson', b: 'Pro AI helps structure your content for better learning outcomes.' },
        corporate: { t: 'Smarter AI for your deck', b: 'Pro AI generates higher-quality content and more polished layouts.' },
        creative: { t: 'AI that matches your vision', b: 'Pro AI generates higher-quality designs that match your creative direction.' },
        student: { t: 'Better AI, better slides', b: 'Pro AI generates higher-quality content and more design options.' },
        fallback: { t: 'Smarter AI, better slides', b: 'Pro AI generates higher-quality content and more design options.' }
      },
      analytics: {
        founder: { t: 'Know when investors open your pitch', b: 'See who viewed your deck, how long they spent, and which slides caught their attention.' },
        sales: { t: 'Track your prospect\'s engagement', b: 'See when your client opens the deck. Know which slides they lingered on.' },
        educator: { t: 'See student engagement', b: 'Track how students interact with your shared presentation.' },
        corporate: { t: 'See who\'s reviewed your deck', b: 'Track whether leadership has seen your presentation before the meeting.' },
        creative: { t: 'See client engagement', b: 'Know when your client opens your portfolio and which work caught their eye.' },
        student: { t: 'See who viewed your deck', b: 'Get insights on who opened your presentation.' },
        fallback: { t: 'See who viewed your deck', b: 'Get insights on who opened your presentation and how they engaged with it.' }
      },
      collaboration: {
        founder: { t: 'Build your pitch together', b: 'Invite your co-founder to collaborate in real-time on your investor deck.' },
        sales: { t: 'Collaborate with your team', b: 'Work together on your sales deck with real-time collaboration.' },
        educator: { t: 'Co-create with colleagues', b: 'Collaborate with fellow educators on shared lesson materials.' },
        corporate: { t: 'Team collaboration', b: 'Invite your team to edit and review the presentation together.' },
        creative: { t: 'Collaborate with clients', b: 'Let clients comment and provide feedback in real-time.' },
        student: { t: 'Work with classmates', b: 'Collaborate on group presentations together.' },
        fallback: { t: 'Real-time collaboration', b: 'Invite others to edit your presentation together.' }
      },
      pro_template: {
        founder: { t: 'Premium pitch templates', b: 'Investor-grade templates designed for fundraising decks.' },
        sales: { t: 'Sales-ready templates', b: 'Templates designed to close deals and impress clients.' },
        educator: { t: 'Educational templates', b: 'Templates designed for engaging lessons and training materials.' },
        corporate: { t: 'Corporate templates', b: 'Polished templates for executive presentations and reports.' },
        creative: { t: 'Designer templates', b: 'Premium templates with creative layouts and modern design.' },
        student: { t: 'Pro templates', b: 'Stand out with premium template designs.' },
        fallback: { t: 'Pro templates', b: 'Access premium templates for better presentations.' }
      }
    };

    for (const trigId of ['branding','pdf_export','ai_enhance','analytics','collaboration','pro_template']) {
      const trigger = TRIGGERS.find(t => t.id === trigId);
      const copy = gateData[trigId][arch.id];
      nudges.push({
        archetype: arch,
        phase: PHASES[3], // gate_hit
        trigger: trigger,
        nudgeType: 'Contextual Tooltip',
        intensity: 'medium',
        title: copy.t,
        body: copy.b,
        primaryCTA: 'See Pro plans',
        secondaryCTA: '',
        session: 'S1',
        composition: 'Shell(compact, anchored) + Icon + Title + ValueProp + CTA(primary) + Dismiss(close)',
        dismiss: ['close'],
        suppressed: false,
        reason: 'Counts as 1 nudge toward session cap (3 max)'
      });
    }

    // Credit milestones
    const creditData = {
      credit_100: {
        founder: { t: 'Half your credits used', b: 'You\'ve used 100 credits on your pitch deck. Pro gives you unlimited generations to perfect every slide.' },
        sales: { t: 'Investing in this deck', b: '100 credits used. You\'re building something strong — go unlimited with Pro.' },
        educator: { t: '100 credits used', b: 'You\'ve put 100 credits into this lesson. Pro gives you unlimited AI.' },
        corporate: { t: 'Halfway through your credits', b: '100 credits used. Unlock unlimited with Pro.' },
        creative: { t: 'Don\'t limit your creativity', b: '100 credits used. Your creative flow shouldn\'t have a cap.' },
        student: { t: 'Half your free credits used', b: 'You\'ve used half your free credits. Keep an eye on your balance.' },
        fallback: { t: 'Credits update', b: 'You\'ve used 100 of your 200 free credits. Pro gives you unlimited generations.' }
      },
      credit_50: {
        founder: { t: 'Running low on credits', b: '~10 slides left at your pace. Don\'t let credits limit your pitch.' },
        sales: { t: 'Running low', b: '~10 slides left. Finish your sales deck strong with unlimited Pro.' },
        educator: { t: 'Credits getting low', b: '~10 slides left. Keep building your lesson with Pro.' },
        corporate: { t: 'Credits running low', b: '~10 slides left. Upgrade to finish without limits.' },
        creative: { t: 'Almost halfway gone', b: '~10 slides left. Go unlimited.' },
        student: { t: 'Running low on credits', b: 'Running low on credits.' },
        fallback: { t: 'Credits running low', b: '~10 slides left at your pace.' }
      },
      credit_25: {
        founder: { t: 'Almost out', b: '~5 slides left. Your pitch isn\'t done — upgrade to finish strong.' },
        sales: { t: 'Nearly depleted', b: '~5 slides left. Don\'t lose momentum — upgrade to Pro.' },
        educator: { t: 'Very few credits left', b: '~5 slides left. Upgrade to keep creating.' },
        corporate: { t: 'Almost out of credits', b: '~5 slides left. Unlock unlimited with Pro.' },
        creative: { t: 'Nearly out', b: '~5 slides left. Your creativity shouldn\'t stop here.' },
        student: { t: 'Almost out of credits', b: 'Almost out of credits.' },
        fallback: { t: 'Almost out of credits', b: '~5 slides left.' }
      },
      credit_0: {
        founder: { t: 'Your pitch isn\'t done yet', b: 'You\'ve used all 200 credits. Upgrade to keep refining — investors will notice the difference.' },
        sales: { t: 'Don\'t lose momentum', b: 'All credits used. Upgrade to Pro to finish and send a polished deck.' },
        educator: { t: 'Keep creating', b: 'All credits used. Upgrade for unlimited AI to complete your lesson.' },
        corporate: { t: 'Continue your work', b: 'All 200 credits used. Upgrade to Pro for unlimited generations.' },
        creative: { t: 'Your creativity shouldn\'t stop here', b: 'Upgrade to Pro and keep creating without limits.' },
        student: { t: 'Out of credits', b: 'All free credits used. See Pro pricing, or wait for credits to refresh.' },
        fallback: { t: 'Credits used up', b: 'All 200 free credits used. Upgrade to Pro for unlimited AI generations.' }
      }
    };

    const creditPhases = [
      { phaseIdx: 4, key: 'credit_100', intensity: 'medium', type: 'Credit Alert', proof: '100 credits used. ~20 slides left.' },
      { phaseIdx: 5, key: 'credit_50', intensity: 'medium', type: 'Credit Alert', proof: '150 credits used. ~10 slides left.' },
      { phaseIdx: 6, key: 'credit_25', intensity: 'medium-high', type: 'Credit Alert', proof: '175 credits used. ~5 slides left.' },
      { phaseIdx: 7, key: 'credit_0', intensity: 'high', type: 'Depleted Panel', proof: 'All 200 credits used. AI generation blocked.' }
    ];

    for (const cp of creditPhases) {
      const copy = creditData[cp.key][arch.id];
      nudges.push({
        archetype: arch,
        phase: PHASES[cp.phaseIdx],
        trigger: TRIGGERS.find(t=>t.id==='credits'),
        nudgeType: cp.type,
        intensity: cp.intensity,
        title: copy.t,
        body: copy.b,
        primaryCTA: cp.key === 'credit_0' ? 'Upgrade to Pro' : 'Upgrade to Pro',
        secondaryCTA: cp.key === 'credit_0' ? 'When do credits refresh?' : 'Maybe later',
        session: 'S1',
        composition: cp.key === 'credit_0'
          ? 'Shell(expanded, overlay) + Icon(credits) + Title + ValueProp + Proof(credit-math) + CTA(primary+secondary)'
          : 'Shell(standard, overlay) + Icon(credits) + Title + ValueProp + Proof(credit-math) + CTA(primary+secondary) + Dismiss(close+later)',
        dismiss: cp.key === 'credit_0' ? [] : ['close', 'remind me later'],
        suppressed: false,
        reason: cp.key === 'credit_0' ? 'Functional blocker — always shows, does not count toward cap' : 'Counts toward cap. Max 2 credit alerts per session.'
      });
    }

    // Export/Share
    const exportData = {
      founder: { t: 'Present to investors without our watermark', b: 'Your pitch deck is ready — present it with your brand, not ours. Pro removes the watermark and unlocks PDF export.' },
      sales: { t: 'Send a branded deck to close the deal', b: 'Your client should see your brand on the cover, not ours. Upgrade to share a watermark-free PDF.' },
      educator: { t: 'Share a clean presentation with your class', b: 'Your students deserve a distraction-free experience. Share without the watermark with Pro.' },
      corporate: { t: 'Share without the watermark', b: 'Present to leadership with a clean, branded deck. Pro removes the watermark and enables PDF export.' },
      creative: { t: 'Present your work without distractions', b: 'Your portfolio piece deserves a clean presentation. Remove the watermark and export as PDF.' },
      student: { t: 'Share a clean deck', b: 'Remove the Presentations.AI watermark and share a polished version of your deck.' },
      fallback: { t: 'Share without branding', b: 'Remove the watermark and export your presentation as a professional PDF.' }
    };
    const exp = exportData[arch.id];
    nudges.push({
      archetype: arch,
      phase: PHASES[8], // export_share
      trigger: TRIGGERS.find(t=>t.id==='pdf_export'),
      nudgeType: 'Slide-over Panel',
      intensity: 'medium-high',
      title: exp.t,
      body: exp.b,
      primaryCTA: 'Upgrade to Pro',
      secondaryCTA: 'Compare plans',
      session: 'S1',
      composition: 'Shell(expanded, overlay) + Icon(export) + Title + ValueProp + Visual(before-after) + CTA(primary+secondary) + Dismiss(close+later+never)',
      dismiss: ['close', 'not now', 'don\'t show again'],
      suppressed: false,
      reason: 'Highest-intent moment. Counts toward cap.'
    });

    // Deck complete — celebration
    const celebData = {
      founder: { t: 'Your pitch deck is ready!', b: 'With Pro, export as a polished PDF and present with your own branding. Own the room.' },
      sales: { t: 'Your sales deck is done!', b: 'Pro adds viewer analytics — see when your client opens it and which slides they focus on.' },
      educator: { t: 'Your lesson is ready!', b: 'Share it seamlessly with your class — Pro removes the watermark and unlocks PDF export.' },
      corporate: { t: 'Your presentation is complete!', b: 'Pro polishes it with your company\'s brand and lets you export a clean PDF for leadership.' },
      creative: { t: 'Your portfolio piece is done!', b: 'Pro removes the watermark so your work speaks for itself. Export as PDF for client delivery.' },
      student: { t: 'Nice work! Your deck is ready.', b: 'Share it with your classmates or download it for your presentation.' },
      fallback: { t: 'Your presentation is ready!', b: 'Upgrade to Pro for watermark-free sharing and PDF export.' }
    };
    const cel = celebData[arch.id];
    nudges.push({
      archetype: arch,
      phase: PHASES[9], // deck_complete
      trigger: TRIGGERS.find(t=>t.id==='none'),
      nudgeType: 'Celebration Card',
      intensity: 'medium',
      title: cel.t,
      body: cel.b,
      primaryCTA: 'Upgrade to Pro',
      secondaryCTA: 'Maybe later',
      session: 'S1',
      composition: 'Shell(standard, overlay) + Icon(celebration) + Title + ValueProp + CTA(primary+secondary) + Dismiss(close)',
      dismiss: ['close'],
      suppressed: false,
      reason: 'Counts toward cap. Suppressed if cap already reached.'
    });

    // Session 2 return — banner
    const s2Data = {
      founder: { t: 'Welcome back!', b: 'Upgrade to Pro — unlimited AI, your branding, PDF exports.' },
      sales: { t: 'Welcome back!', b: 'Pro adds analytics and unlimited presentations for your team.' },
      educator: { t: 'Welcome back!', b: 'Go Pro for unlimited lessons and watermark-free sharing.' },
      corporate: { t: 'Welcome back!', b: 'Upgrade to Pro for your company\'s branding and unlimited decks.' },
      creative: { t: 'Welcome back!', b: 'Pro removes limits — unlimited decks, your brand, PDF delivery.' },
      student: { t: 'Welcome back!', b: 'Your credits have been refreshed.' },
      fallback: { t: 'Welcome back!', b: 'See what Pro can do for your presentations.' }
    };
    const s2 = s2Data[arch.id];
    nudges.push({
      archetype: arch,
      phase: PHASES[10], // session_2
      trigger: TRIGGERS.find(t=>t.id==='none'),
      nudgeType: 'Banner',
      intensity: 'low',
      title: s2.t,
      body: s2.b,
      primaryCTA: 'See Pro plans',
      secondaryCTA: '',
      session: 'S2',
      composition: 'Shell(compact, fixed) + Icon + Title + CTA(primary) + Dismiss(close)',
      dismiss: ['close'],
      suppressed: false,
      reason: 'Session 2 only. Does not appear in Session 1.'
    });
  }

  return nudges;
}

const ALL_NUDGES = generateAllNudges();

// ============================================================
// FILTERS & STATE
// ============================================================

let filters = {
  intensity: new Set(),
  archetype: new Set(),
  phase: new Set(),
  groupBy: 'intensity'
};

function toggleFilter(category, value) {
  if (filters[category].has(value)) {
    filters[category].delete(value);
  } else {
    filters[category].add(value);
  }
  renderFilters();
  renderMatrix();
}

function setGroupBy(val) {
  filters.groupBy = val;
  document.querySelectorAll('.group-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === val || (val === 'none' && b.textContent === 'None')));
  renderMatrix();
}

function getFilteredNudges() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  return ALL_NUDGES.filter(n => {
    if (filters.intensity.size && !filters.intensity.has(n.intensity)) return false;
    if (filters.archetype.size && !filters.archetype.has(n.archetype.id)) return false;
    if (filters.phase.size && !filters.phase.has(n.phase.id)) return false;
    if (search) {
      const haystack = `${n.title} ${n.body} ${n.nudgeType} ${n.archetype.name} ${n.phase.name} ${n.trigger.name} ${n.primaryCTA}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
}

// ============================================================
// RENDER
// ============================================================

function renderFilters() {
  document.getElementById('intensityFilters').innerHTML = INTENSITIES.map(i =>
    `<div class="filter-chip ${filters.intensity.has(i.id)?'active':''}" onclick="toggleFilter('intensity','${i.id}')">${i.name}</div>`
  ).join('');

  document.getElementById('archetypeFilters').innerHTML = ARCHETYPES.map(a =>
    `<div class="filter-chip ${filters.archetype.has(a.id)?'active':''}" onclick="toggleFilter('archetype','${a.id}')">${a.emoji} ${a.name}</div>`
  ).join('');

  document.getElementById('phaseFilters').innerHTML = PHASES.map(p =>
    `<div class="filter-chip ${filters.phase.has(p.id)?'active':''}" onclick="toggleFilter('phase','${p.id}')">${p.name}</div>`
  ).join('');
}

function renderMatrix() {
  const filtered = getFilteredNudges();
  document.getElementById('totalCount').textContent = ALL_NUDGES.length;
  document.getElementById('showingCount').textContent = filtered.length;

  const container = document.getElementById('tableContainer');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">No nudges match the current filters.</div>';
    return;
  }

  if (filters.groupBy === 'none') {
    container.innerHTML = renderTable(filtered);
    return;
  }

  // Group
  const groups = {};
  const groupConfig = {
    intensity: { key: n => n.intensity, label: id => { const i = INTENSITIES.find(x=>x.id===id); return i ? i.name : id; }, order: INTENSITIES.map(i=>i.id) },
    phase: { key: n => n.phase.id, label: id => { const p = PHASES.find(x=>x.id===id); return p ? p.name : id; }, order: PHASES.map(p=>p.id) },
    archetype: { key: n => n.archetype.id, label: id => { const a = ARCHETYPES.find(x=>x.id===id); return a ? `${a.emoji} ${a.name}` : id; }, order: ARCHETYPES.map(a=>a.id) }
  };

  const cfg = groupConfig[filters.groupBy];
  for (const n of filtered) {
    const gk = cfg.key(n);
    if (!groups[gk]) groups[gk] = [];
    groups[gk].push(n);
  }

  let html = '';
  for (const gk of cfg.order) {
    if (!groups[gk]) continue;
    const label = cfg.label(gk);
    html += `<div class="group-header">${label} <span class="count">${groups[gk].length}</span></div>`;
    html += renderTable(groups[gk]);
  }

  container.innerHTML = html;
}

function renderTable(nudges) {
  return `
    <table>
      <thead>
        <tr>
          <th class="col-phase">Phase</th>
          <th class="col-archetype">Archetype</th>
          <th class="col-trigger">Trigger</th>
          <th class="col-type">Nudge Type</th>
          <th class="col-intensity">Level</th>
          <th class="col-title">Title</th>
          <th class="col-body">Body Copy</th>
          <th class="col-cta">CTA</th>
          <th class="col-session">S</th>
        </tr>
      </thead>
      <tbody>
        ${nudges.map((n, i) => `
          <tr class="${n.suppressed ? 'suppressed' : ''} expand-row" onclick="toggleDetail(this)">
            <td class="col-phase"><span class="phase-badge">${n.phase.name}</span></td>
            <td class="col-archetype"><span class="archetype-badge">${n.archetype.emoji} ${n.archetype.name}</span></td>
            <td class="col-trigger"><span class="trigger-badge">${n.trigger.icon} ${n.trigger.name}</span></td>
            <td class="col-type">${n.nudgeType}</td>
            <td class="col-intensity"><span class="badge badge-${n.intensity}">${n.intensity}</span></td>
            <td class="col-title"><span class="nudge-title">${n.title}</span></td>
            <td class="col-body"><span class="nudge-body">${n.body}</span></td>
            <td class="col-cta">
              <div class="cta-text">${n.primaryCTA}</div>
              ${n.secondaryCTA ? `<div class="cta-secondary">${n.secondaryCTA}</div>` : ''}
            </td>
            <td class="col-session"><span class="session-badge">${n.session}</span></td>
          </tr>
          <tr class="detail-row" style="display:none">
            <td colspan="9">
              <div class="detail-content">
                <div class="detail-block">
                  <h4>Component Composition</h4>
                  <div class="comp-code">${n.composition}</div>
                </div>
                <div class="detail-block">
                  <h4>Dismiss Options</h4>
                  ${n.dismiss.length ? `<div class="dismiss-tags">${n.dismiss.map(d=>`<span class="dismiss-tag">${d}</span>`).join('')}</div>` : '<p>None (functional blocker)</p>'}
                </div>
                <div class="detail-block">
                  <h4>Rules Note</h4>
                  <p>${n.reason}</p>
                </div>
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function toggleDetail(row) {
  const detail = row.nextElementSibling;
  if (detail && detail.classList.contains('detail-row')) {
    detail.style.display = detail.style.display === 'none' ? 'table-row' : 'none';
  }
}

// Init
renderFilters();
renderMatrix();
</script>
</body>
</html>
